site_name: Cosmos
site_url: https://docs.polli.ai/cosmos
repo_url: https://github.com/polli-labs/cosmos
repo_name: polli-labs/cosmos
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
  logo: https://assets.polli.ai/docs-brand/v1.0.3/wordmarks/cosmos.svg
  logo_dark: https://assets.polli.ai/docs-brand/v1.0.3/wordmarks/cosmos.svg
extra_css:
  - https://assets.polli.ai/docs-brand/v1.0.3/polli-brand.css
extra_javascript:
  - https://assets.polli.ai/docs-brand/v1.0.3/polli-brand.js
nav:
  - Home: index.md
  - Provenance: provenance.md
  - Ingest:
      - User Guide: ingest-user-guide.md
      - CLI Reference: ingest-reference.md
      - Input Structure: input-structure.md
  - Squarecrop:
      - User Guide: squarecrop-user-guide.md
      - CLI Reference: squarecrop-reference.md
  - CLI:
      - cosmos CLI: cosmos-cli.md
      - squarecrop CLI: squarecrop-cli.md
  - SDK: sdk.md
  - Schemas:
      - ingest_run.v1.json: schemas/ingest_run.v1.json
      - clip.v1.json: schemas/clip.v1.json
      - crop_run.v1.json: schemas/crop_run.v1.json
      - view.v1.json: schemas/view.v1.json
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
markdown_extensions:
  - tables
  - admonition
