name: Tech debt
description: Refactor or cleanup work
labels: ["type:tech-debt","status:open"]
body:
  - type: input
    id: title
    attributes:
      label: Title
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [ingest, crop, ffmpeg, tui, sdk]
  - type: textarea
    id: details
    attributes:
      label: Details

