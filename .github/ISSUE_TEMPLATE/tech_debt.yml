name: Tech debt
description: Refactor or cleanup work
labels: ["type:tech-debt","status:open"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: One-line debt summary
    validations: { required: true }
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations: { required: true }
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [ingest, crop, optimize, provenance, ffmpeg, sdk, docs, ci]
    validations: { required: true }
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe debt source, risk, and target improvement.
    validations: { required: true }
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List objective checks for closure.
