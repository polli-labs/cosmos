name: Chore
description: Routine maintenance or setup
labels: ["type:chore","status:open"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: One-line maintenance task summary
    validations: { required: true }
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations: { required: true }
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [ingest, crop, optimize, provenance, ffmpeg, sdk, docs, ci]
    validations: { required: true }
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include explicit scope and done criteria.
    validations: { required: true }
