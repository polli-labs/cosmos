name: Feature request
description: Propose a new capability
labels: ["type:feature","status:open"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: One-line summary
    validations: { required: true }
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations: { required: true }
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [ingest, crop, optimize, provenance, ffmpeg, sdk, docs, ci]
    validations: { required: true }
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/operator pain does this solve?
    validations: { required: true }
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Proposed behavior, CLI/SDK/API shape, and acceptance criteria.
    validations: { required: true }
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals (optional)
      description: Clarify what this issue explicitly does not cover.
