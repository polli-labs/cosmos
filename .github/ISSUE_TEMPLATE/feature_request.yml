name: Feature request
description: Propose a new capability
labels: ["type:feature","status:open"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: One-line summary
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations: { required: true }
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [ingest, crop, ffmpeg, tui, sdk]
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Context, acceptance criteria, notes

