name: Seed labels
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              {name: "priority:P0", color: "b60205"},
              {name: "priority:P1", color: "d93f0b"},
              {name: "priority:P2", color: "fbca04"},
              {name: "priority:P3", color: "c5def5"},
              {name: "status:open", color: "ededed"},
              {name: "status:in_progress", color: "1d76db"},
              {name: "status:blocked", color: "5319e7"},
              {name: "status:needs_review", color: "fbca04"},
              {name: "status:changes_requested", color: "b60205"},
              {name: "status:approved", color: "0e8a16"},
              {name: "status:completed", color: "0e8a16"},
              {name: "status:closed", color: "000000"},
              {name: "status:archived", color: "c0c0c0"},
              {name: "type:bug", color: "d73a4a"},
              {name: "type:feature", color: "a2eeef"},
              {name: "type:tech-debt", color: "7057ff"},
              {name: "type:docs", color: "0075ca"},
              {name: "type:chore", color: "bfdadc"},
              {name: "comp:ingest", color: "97a9d6"},
              {name: "comp:crop", color: "85e89d"},
              {name: "comp:ffmpeg", color: "f9d0c4"},
              {name: "comp:tui", color: "c2e0c6"},
              {name: "comp:sdk", color: "fef2c0"}
            ];
            for (const l of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...l });
              } catch (e) {}
            }

